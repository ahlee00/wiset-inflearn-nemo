<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemo Real Estate Analytics Dashboard v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --accent-tertiary: #f472b6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --gradient-main: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 4rem;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.3));
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.25rem;
            font-weight: 300;
        }

        /* Metrics Display */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-primary);
        }

        .metric-card:hover::before {
            opacity: 1;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Dashboard Sections */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title span {
            width: 40px;
            height: 4px;
            background: var(--gradient-main);
            border-radius: 2px;
        }

        /* Charts Layout */
        .dashboard-layout {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .span-8 { grid-column: span 8; }
        .span-4 { grid-column: span 4; }
        .span-6 { grid-column: span 6; }
        .span-12 { grid-column: span 12; }

        @media (max-width: 1200px) {
            .span-8, .span-4, .span-6 { grid-column: span 12; }
        }

        .chart-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: var(--card-shadow);
            height: 100%;
        }

        .chart-box h3 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .canvas-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* Data Table */
        .table-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 2.5rem;
            box-shadow: var(--card-shadow);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.75rem;
        }

        th {
            text-align: left;
            padding: 1.25rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1.5rem 1.25rem;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s;
        }

        tr td:first-child { border-radius: 1rem 0 0 1rem; }
        tr td:last-child { border-radius: 0 1rem 1rem 0; }

        tr:hover td {
            background: rgba(255, 255, 255, 0.06);
            color: var(--accent-primary);
        }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

    </style>
</head>
<body>
    <div class="container">
        <header class="reveal">
            <h1>NEMO DATA ANALYTICS</h1>
            <p>상업용 부동산 시장의 디지털 전환과 데이터 통계 인사이트</p>
        </header>

        <!-- Metrics -->
        <div class="metrics-grid reveal delay-1" id="metrics-container"></div>

        <h2 class="section-title reveal delay-2"><span></span> 시장 동향 및 분포 분석</h2>
        
        <div class="dashboard-layout reveal delay-2">
            <!-- Business Distribution (Large) -->
            <div class="chart-box span-8">
                <h3>업종별 매물 분포 (Top 10)</h3>
                <div class="canvas-container">
                    <canvas id="businessChart"></canvas>
                </div>
            </div>

            <!-- Price Type (Small) -->
            <div class="chart-box span-4">
                <h3>가격 유형별 비중</h3>
                <div class="canvas-container">
                    <canvas id="priceTypeChart"></canvas>
                </div>
            </div>

            <!-- Subway Distribution (Medium) -->
            <div class="chart-box span-6">
                <h3>지하철역 근접성 분포</h3>
                <div class="canvas-container">
                    <canvas id="subwayChart"></canvas>
                </div>
            </div>

            <!-- Keyword Radar (Medium) -->
            <div class="chart-box span-6">
                <h3>핵심 키워드 중요도 (TF-IDF)</h3>
                <div class="canvas-container">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>
        </div>

        <h2 class="section-title reveal delay-3"><span></span> 실시간 인기 매물 데이터</h2>

        <div class="table-box reveal delay-4">
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>매물 정보</th>
                            <th>업종 분류</th>
                            <th>보증금 / 월세</th>
                            <th>전용 면적</th>
                            <th>조회수</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Data Model
        const dashboardData = {
            "metrics": {
                "total_items": 1071,
                "avg_deposit": 61299,
                "avg_monthly_rent": 4675,
                "avg_premium": 42608,
                "avg_size": 124.03,
                "max_deposit": 2000000,
                "max_monthly_rent": 90000
            },
            "business_dist": {
                "기타창업모음": 431,
                "다용도점포": 84,
                "커피점/카페": 72,
                "기타서비스업": 64,
                "한식점": 50,
                "기타음식점": 33,
                "미용실": 31,
                "기타휴게점": 19,
                "고깃집": 17,
                "피부미용": 14
            },
            "subway_dist": {
                "역삼역 (도보 5분)": 62,
                "역삼역 (도보 6분)": 59,
                "역삼역 (도보 4분)": 51,
                "강남역 (도보 5분)": 43,
                "역삼역 (도보 7분)": 41,
                "강남역 (도보 6분)": 40,
                "역삼역 (도보 3분)": 31,
                "신논현역 (도보 3분)": 30,
                "역삼역 (도보 8분)": 28,
                "양재역 (도보 11분)": 28
            },
            "price_type_dist": {
                "임대 (Rent)": 1060,
                "매매 (Sale)": 11
            },
            "keywords": [
                { "word": "아정당부동산", "score": 182.0 },
                { "word": "역삼동", "score": 119.82 },
                { "word": "서초동", "score": 65.66 },
                { "word": "인테리어", "score": 62.7 },
                { "word": "역세권", "score": 62.67 },
                { "word": "강남역", "score": 59.1 },
                { "word": "좋은입지", "score": 58.0 },
                { "word": "1층매물", "score": 57.75 }
            ],
            "recent_items": [
                { "title": "신논현역 역세권, 깔끔한 인테리어 스페이스", "businessMiddleCodeName": "기타서비스업", "deposit": 4000, "monthlyRent": 150, "size": 30.6, "viewCount": 1408 },
                { "title": "서초동 강남역, 양재역 더블 역세권 공실", "businessMiddleCodeName": "기타창업모음", "deposit": 10000, "monthlyRent": 1000, "size": 66.12, "viewCount": 1359 },
                { "title": "강남역 인근 역세권 파티룸 전대", "businessMiddleCodeName": "기타창업모음", "deposit": 5000, "monthlyRent": 700, "size": 32.64, "viewCount": 1140 },
                { "title": "강남역 역세권, 트렌디한 인테리어 스페이스", "businessMiddleCodeName": "기타서비스업", "deposit": 10000, "monthlyRent": 900, "size": 38.96, "viewCount": 1117 },
                { "title": "강남역 역세권, 촬영 시설 완비 스튜디오", "businessMiddleCodeName": "기타서비스업", "deposit": 5000, "monthlyRent": 450, "size": 25.34, "viewCount": 1108 },
                { "title": "선릉역 역세권, 주방 시설 완비된 일식당", "businessMiddleCodeName": "일식점", "deposit": 20000, "monthlyRent": 2000, "size": 76.92, "viewCount": 1097 },
                { "title": "강남역거리 메인상권 역삼동 1층 카페", "businessMiddleCodeName": "커피점/카페", "deposit": 130000, "monthlyRent": 5000, "size": 29.75, "viewCount": 1050 },
                { "title": "강남역 역세권, 시설 완비 분식집", "businessMiddleCodeName": "떢볶이/튀김", "deposit": 30000, "monthlyRent": 2300, "size": 26.45, "viewCount": 1021 },
                { "title": "신논현역 초역세권 유동인구 많은 고깃집", "businessMiddleCodeName": "고깃집", "deposit": 40000, "monthlyRent": 6700, "size": 66.12, "viewCount": 988 },
                { "title": "역삼동 위치조건 뛰어난 카페 매물", "businessMiddleCodeName": "커피점/카페", "deposit": 10000, "monthlyRent": 1000, "size": 19.83, "viewCount": 956 }
            ]
        };

        // Utility Functions
        const fmt = (num) => new Intl.NumberFormat('ko-KR').format(num);

        // Render Metrics
        const renderMetrics = () => {
            const container = document.getElementById('metrics-container');
            const items = [
                { label: '전체 매물', value: fmt(dashboardData.metrics.total_items) + '건' },
                { label: '평균 보증금', value: '₩' + fmt(dashboardData.metrics.avg_deposit) + '만' },
                { label: '평균 월세', value: '₩' + fmt(dashboardData.metrics.avg_monthly_rent) + '만' },
                { label: '평균 면적', value: dashboardData.metrics.avg_size + '㎡' }
            ];

            items.forEach(item => {
                container.innerHTML += `
                    <div class="metric-card">
                        <div class="metric-value">${item.value}</div>
                        <div class="metric-label">${item.label}</div>
                    </div>
                `;
            });
        };

        // Chart Styling
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Outfit', 'Noto Sans KR'";

        const createChart = (id, type, labels, data, colors, options = {}) => {
            return new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderColor: 'transparent',
                        borderWidth: 0,
                        borderRadius: type === 'bar' ? 10 : 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: type !== 'bar', position: 'bottom', labels: { padding: 20 } },
                        tooltip: { 
                            backgroundColor: '#1e293b', 
                            titleColor: '#38bdf8', 
                            padding: 12,
                            cornerRadius: 8
                        }
                    },
                    ...options
                }
            });
        };

        // Initialize Dashboard
        window.onload = () => {
            renderMetrics();

            // Business Chart
            createChart('businessChart', 'bar', Object.keys(dashboardData.business_dist), Object.values(dashboardData.business_dist), 'rgba(56, 189, 248, 0.7)', {
                indexAxis: 'y',
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            });

            // Price Type
            createChart('priceTypeChart', 'doughnut', Object.keys(dashboardData.price_type_dist), Object.values(dashboardData.price_type_dist), ['#38bdf8', '#f472b6'], {
                cutout: '75%'
            });

            // Subway
            createChart('subwayChart', 'bar', Object.keys(dashboardData.subway_dist), Object.values(dashboardData.subway_dist), 'rgba(129, 140, 248, 0.7)', {
                scales: {
                    x: { ticks: { display: false }, grid: { display: false } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            });

            // Keyword Radar
            new Chart(document.getElementById('keywordChart'), {
                type: 'radar',
                data: {
                    labels: dashboardData.keywords.map(k => k.word),
                    datasets: [{
                        label: '중요도',
                        data: dashboardData.keywords.map(k => k.score),
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderColor: '#38bdf8',
                        borderWidth: 2,
                        pointBackgroundColor: '#38bdf8'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { font: { size: 12 } },
                            ticks: { display: false }
                        }
                    }
                }
            });

            // Table
            const tbody = document.getElementById('table-body');
            dashboardData.recent_items.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight: 700; font-size: 1.1rem; color: #fff;">${item.title}</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary);">강남권 핵심 상권</div>
                        </td>
                        <td><span class="status-badge">${item.businessMiddleCodeName}</span></td>
                        <td>
                            <div style="font-weight: 600;">₩${fmt(item.deposit)} / ₩${fmt(item.monthlyRent)}</div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary);">단위: 만원</div>
                        </td>
                        <td>${item.size}㎡</td>
                        <td style="color: #fbbf24; font-weight: 800; font-size: 1.2rem;">${fmt(item.viewCount)}</td>
                    </tr>
                `;
            });
        };
    </script>
</body>
</html>
